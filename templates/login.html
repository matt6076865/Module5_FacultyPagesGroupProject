<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Faculty Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/spc.css" />
  <style>
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 40px 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background-color: #fafafa;
      border: 1px solid #d2d2d2;
      border-radius: 10px;
      padding: 40px 36px;
    }

    .login-card h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
      text-align: center;
    }

    .login-card .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .login-card label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #a9a9a9;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .login-card input[type="password"]:focus {
      outline: none;
      border-color: #005fc4;
      box-shadow: 0 0 0 3px rgba(0, 95, 196, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: #005fc4;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 18px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #005fc4;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-container">

    <header class="site-header">
      <div class="d-flex flex-wrap justify-content-center py-2 mb-4" id="header">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
          <svg class="bi me-2" width="40" height="32" aria-hidden="true"><use xlink:href="#bootstrap"></use></svg>
          <span class="fs-4"><img src="" class="header-logo" alt=""></span>
        </a>
      </div>

      <div class="top-bar">
        <div></div>
        <nav class="main-nav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="#" class="active">Login</a>
        </nav>
        <div></div>
      </div>
    </header>

    <div class="login-wrapper">
      <div class="login-card">
        <h1>Faculty Portal</h1>
        <p class="subtitle">Admin access required to edit faculty records</p>

        <div id="error-message" class="error-message" role="alert"></div>

        <form id="login-form" novalidate>
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter admin password"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="login-btn" id="login-btn">Log In</button>
        </form>

        <a href="/" class="back-link">← Back to Faculty Directory</a>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorEl.style.display = 'none';

      const password = document.getElementById('password').value;
      if (!password) {
        showError('Please enter a password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in…';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/edit';
        } else {
          showError(data.error || 'Login failed. Please try again.');
        }
      } catch (err) {
        showError('Network error — please try again.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
  </script>
</body>
</html>
